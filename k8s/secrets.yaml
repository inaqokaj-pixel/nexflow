apiVersion: v1
kind: Secret
metadata:
  name: nexflow-secrets
  namespace: nexflow
type: Opaque
stringData:
  # Database
  postgres-password: "postgres123"
  # JWT
  jwt-secret: "nexflow_secret_key"
  # RabbitMQ
  rabbitmq-user: "admin"
  rabbitmq-password: "admin123"
  # Stripe — replace with your real key before deploying
  stripe-secret-key: "sk_test_REPLACE_ME"
  # Google OAuth — replace with your real client ID
  google-client-id: "REPLACE_ME.apps.googleusercontent.com"
