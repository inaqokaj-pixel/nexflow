apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: nexflow
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: nexflow/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: NODE_ENV
            - name: DB_HOST
              value: "postgres-notification"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "notification_db"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexflow-secrets
                  key: postgres-password
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: RABBITMQ_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: nexflow
spec:
  selector:
    app: notification-service
  ports:
    - port: 3005
      targetPort: 3005
