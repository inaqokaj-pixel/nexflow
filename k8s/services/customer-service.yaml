apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: nexflow
  labels:
    app: customer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      containers:
        - name: customer-service
          image: nexflow/customer-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: NODE_ENV
            - name: DB_HOST
              value: "postgres-customer"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "customer_db"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexflow-secrets
                  key: postgres-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexflow-secrets
                  key: jwt-secret
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: RABBITMQ_URL
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: nexflow-secrets
                  key: google-client-id
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: nexflow
spec:
  selector:
    app: customer-service
  ports:
    - port: 3001
      targetPort: 3001
