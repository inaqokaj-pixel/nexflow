apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nexflow
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: nexflow/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: NODE_ENV
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexflow-secrets
                  key: jwt-secret
            - name: CUSTOMER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: CUSTOMER_SERVICE_URL
            - name: RESOURCE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: RESOURCE_SERVICE_URL
            - name: BOOKING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: BOOKING_SERVICE_URL
            - name: PAYMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: PAYMENT_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: NOTIFICATION_SERVICE_URL
            - name: TRACKING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: nexflow-config
                  key: TRACKING_SERVICE_URL
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: nexflow-secrets
                  key: google-client-id
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "400m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nexflow
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
# Ingress — exposes the gateway and frontend to external traffic.
# Requires an ingress controller (e.g. nginx-ingress) to be installed.
# Install: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexflow-ingress
  namespace: nexflow
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: nexflow.local   # Change to your real domain in production
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
