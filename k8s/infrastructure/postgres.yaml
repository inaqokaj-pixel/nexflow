# ============================================================
# postgres-customer
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-customer-pvc
  namespace: nexflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-customer
  namespace: nexflow
  labels:
    app: postgres-customer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-customer
  template:
    metadata:
      labels:
        app: postgres-customer
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "customer_db"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexflow-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "customer_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-customer-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-customer
  namespace: nexflow
spec:
  selector:
    app: postgres-customer
  ports:
    - port: 5432
      targetPort: 5432
---
